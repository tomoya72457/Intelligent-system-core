# 目的: 必須チェック（make check・秘密スキャン・workflow lint・PRサイズ）をブロッキングゲートとして実行する。
#       ruleset の required_status_checks は、全ゲートを集約する "ci" ジョブを参照する。
name: CI

on:
  push:
    branches: [main]
  pull_request:

# 既定は読み取りのみ（§3 共通規約）。書き込みが要るジョブは個別に昇格する（本CIには無い）。
permissions:
  contents: read

# 同一 ref の実行は直列化し、古い実行はキャンセルする。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # (1) 1コマンド検証。node/python のセットアップはファイル存在で条件分岐する。
  check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: プロファイル検出
        id: detect
        run: |
          if [ -f package.json ]; then echo "node=true" >> "$GITHUB_OUTPUT"; fi
          if [ -f pyproject.toml ]; then echo "python=true" >> "$GITHUB_OUTPUT"; fi
      - name: Node セットアップ
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Node 依存関係のインストール
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Python セットアップ
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: uv セットアップ
        if: steps.detect.outputs.python == 'true'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Python 依存関係の同期
        if: steps.detect.outputs.python == 'true'
        run: uv sync
      - name: make check
        run: make check

  # (2) 秘密スキャン。組織利用でライセンスが要る gitleaks-action は使わず、公式バイナリを直接実行する（無料）。
  gitleaks:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト（全履歴）
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: gitleaks インストール（公式バイナリ）
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          mkdir -p "$RUNNER_TEMP/gitleaks"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"
      - name: gitleaks 実行（git履歴を走査）
        run: gitleaks git . --no-banner --redact=100 --exit-code 1 -v

  # (3) workflow の静的解析（unpinned action・権限過多・インジェクション等を検出）。
  zizmor:
    name: workflow-lint
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Python セットアップ
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: zizmor インストール
        run: pip install "zizmor==1.26.1"
      - name: zizmor 実行
        env:
          GH_TOKEN: ${{ github.token }}
        run: zizmor .github/workflows

  # (4) PRサイズ警告（±400行超で ::warning、ブロックはしない）。pull_request のときだけ実行する。
  pr-size:
    name: pr-size
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト（全履歴）
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 変更行数の確認
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          stat=$(git diff --shortstat "$BASE_SHA" "$HEAD_SHA" || true)
          ins=$(printf '%s' "$stat" | sed -n 's/.*[, ]\([0-9]*\) insertion.*/\1/p'); ins=${ins:-0}
          del=$(printf '%s' "$stat" | sed -n 's/.*[, ]\([0-9]*\) deletion.*/\1/p'); del=${del:-0}
          total=$((ins + del))
          if [ "$total" -gt 400 ]; then
            echo "::warning::この PR は +${ins}/-${del}=${total} 行の変更を含みます（目安 400 行超）。1PR=1論理変更・±400行以内への分割を検討してください。"
          else
            echo "PR サイズ OK: +${ins}/-${del}=${total} 行"
          fi

  # (集約) ブロッキング必須チェックの本体。ruleset の required_status_checks はこの "ci" を参照する。
  #        advisory な pr-size は含めない（警告のみでブロックしない）。
  ci:
    name: ci
    needs: [check, gitleaks, zizmor]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 必須ゲートの集約
        env:
          CHECK: ${{ needs.check.result }}
          GITLEAKS: ${{ needs.gitleaks.result }}
          ZIZMOR: ${{ needs.zizmor.result }}
        run: |
          echo "check=$CHECK gitleaks=$GITLEAKS zizmor=$ZIZMOR"
          if [ "$CHECK" != "success" ] || [ "$GITLEAKS" != "success" ] || [ "$ZIZMOR" != "success" ]; then
            echo "::error::必須チェックのいずれかが失敗しました。"
            exit 1
          fi
          echo "全必須ゲート成功。"
